site_name: benchr
site_description: A lightweight Python benchmarking framework
repo_url: https://github.com/fikovnik/benchr
repo_name: fikovnik/benchr

# .html URLs (not directory URLs) so the built site also works when opened
# directly from disk (file://), not just from a web server.
use_directory_urls: false

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            docstring_section_style: table
            show_if_no_docstring: true
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_signature_annotations: true
            separate_signature: true
            signature_crossrefs: true
            members_order: source
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Tutorial: tutorial.md
  - API reference:
    - Overview: api/index.md
    - Grammar: api/grammar.md
    - Metrics: api/metrics.md
    - Stopping policies: api/policies.md
    - Data model: api/data.md
    - Runners: api/runners.md
    - Reporting: api/reporting.md
    - CLI: api/cli.md
